[project]
name = "qhld-engine"
version = "1.0.0"
description = "QHLD Engine"
authors = [{ name = "pr3ssh" }]
requires-python = ">=3.12"

dependencies = [
    "beautifulsoup4==4.12.3",
    "cryptography==43.0.3",
    "cssselect==1.2.0",
    "pdf2image==1.17.0",
    "pdfminer.six==20240706",
    "pymongo==4.10.1",
    "pytesseract==0.3.13",
    "python-docx==1.1.2",
    "python-Levenshtein==0.26.1",
    "python-pptx==1.0.2",
    "python-slugify==8.0.4",
    "regex==2024.11.6",
    "requests-futures==1.0.2",
    "six==1.16.0",
    "thefuzz==0.22.1",
    "tqdm==4.67.1",
    "qhld-data",
    "qhld-tasks",
]

[dependency-groups]
dev = ["ipdb==0.13.13"]

[tool.uv.sources]
qhld-data  = { git = "https://github.com/politicalwatch/qhld-data.git" }
qhld-tasks = { git = "https://github.com/politicalwatch/qhld-tasks.git" }

[tool.uv]
package = false
